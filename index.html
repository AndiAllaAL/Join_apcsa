<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APCSA: The Code Upgrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syncopate:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #020617;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Video Stage Frame */
        #animation-stage {
            width: 100%;
            max-width: 960px;
            height: 540px;
            background-color: #000000;
            border: 2px solid #22d3ee;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.2);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px;
            text-align: center;
        }

        /* FIXED: Removed the space so it targets scenes that are currently active */
        .scene.active { display: flex; }

        /* SCENE 1: MATRIX TERMINAL */
        .matrix-bg {
            font-family: 'JetBrains Mono', monospace;
            color: #00ff66;
            font-size: 38px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
            border-right: 3px solid #00ff66;
            white-space: nowrap;
            animation: blink 0.6s step-end infinite;
        }

        /* SCENE 2: AI VORTEX */
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 300px;
            transition: transform 1s ease-in-out;
        }
        .ai-card {
            background: #0f172a;
            border: 1px solid #a855f7;
            padding: 20px;
            border-radius: 12px;
            font-size: 32px;
            color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }
        .vortex-shrink {
            transform: scale(0) rotate(720deg);
            opacity: 0;
        }
        .ai-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 48px;
            color: #ffffff;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .ai-title.reveal { opacity: 1; transform: translateY(0); text-shadow: 0 0 20px #a855f7; }

        /* SCENE 3: AURA FLEX */
        .aura-title { font-family: 'Syncopate', sans-serif; font-size: 42px; margin-bottom: 10px; color: #22d3ee; }
        .counter { font-size: 96px; font-weight: bold; color: #00ff66; text-shadow: 0 0 30px rgba(0, 255, 102, 0.4); }
        .aura-sub { font-size: 24px; color: #94a3b8; margin-top: 20px; transform: scale(0.8); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .aura-sub.pop { transform: scale(1); opacity: 1; }

        /* SCENE 4: CODE BLOCKS SPEEDRUN */
        .block-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
        .code-block {
            background: #0f172a;
            border-left: 5px solid #22d3ee;
            font-family: 'JetBrains Mono', monospace;
            padding: 15px 20px;
            text-align: left;
            border-radius: 0 8px 8px 0;
            font-size: 20px;
            transform: translateX(-100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .code-block.slide-in { transform: translateX(0); opacity: 1; }
        .code-block span { color: #ec4899; }

        /* SCENE 5: SECURE THE BREAD */
        .money-title { font-family: 'Syncopate', sans-serif; font-size: 32px; color: #94a3b8; }
        .cash-value { font-size: 110px; font-weight: 700; color: #00ff66; text-shadow: 0 0 40px rgba(0,255,102,0.5); transform: scale(0.5); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.3); }
        .cash-value.boom { transform: scale(1); opacity: 1; }

        /* SCENE 6: OUTRO LOCK IN */
        .outro-box { background: #010409; border: 1px solid #30363d; font-family: 'JetBrains Mono', monospace; padding: 20px; border-radius: 8px; width: 100%; max-width: 600px; text-align: left; margin-bottom: 30px; font-size: 22px; }
        .lock-btn {
            font-family: 'Syncopate', sans-serif;
            background: linear-gradient(90deg, #ec4899, #a855f7);
            border: none;
            padding: 20px 50px;
            color: white;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(236, 72, 147, 0.4);
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.5s ease;
        }
        .lock-btn.pulse { transform: scale(1); opacity: 1; animation: buttonPulse 1.5s infinite; }

        /* ANIMATIONS & CONTROLS */
        @keyframes blink { 50% { border-color: transparent; } }
        @keyframes buttonPulse { 0% { box-shadow: 0 0 20px rgba(236,72,147,0.4); } 50% { box-shadow: 0 0 40px rgba(236,72,147,0.8); transform: scale(1.03); } 100% { box-shadow: 0 0 20px rgba(236,72,147,0.4); } }

        .controls { margin-top: 25px; display: flex; gap: 15px; }
        .control-btn { background: #1e293b; border: 1px solid #475569; color: #f8fafc; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .control-btn:hover { background: #334155; border-color: #22d3ee; }
    </style>
</head>
<body>

    <div id="animation-stage">
        
        <div class="scene active" id="scene1">
            <div class="matrix-bg" id="terminal-text"></div>
        </div>

        <div class="scene" id="scene2">
            <div class="ai-grid" id="vortex-grid">
                <div class="ai-card"><i class="fa-solid fa-robot"></i></div>
                <div class="ai-card"><i class="fa-brands fa-tiktok"></i></div>
                <div class="ai-card"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="ai-card"><i class="fa-solid fa-car-on"></i></div>
            </div>
            <div class="ai-title" id="ai-text">AI ISN'T MAGIC.</div>
        </div>

        <div class="scene" id="scene3">
            <div class="aura-title">UPGRADE YOUR STATS</div>
            <div class="counter" id="aura-counter">+0</div>
            <div class="aura-sub" id="aura-text">MIND THE ALGORITHM. MASTER IT.</div>
        </div>

        <div class="scene" id="scene4">
            <div class="block-container">
                <div class="code-block" id="block1"><span>int</span> logic = primitives;</div>
                <div class="code-block" id="block2"><span>while</span>(struggling) { loops(); }</div>
                <div class="code-block" id="block3"><span>Object</span> success = new Mastery();</div>
            </div>
        </div>

        <div class="scene" id="scene5">
            <div class="money-title">SECURE THE BREAD</div>
            <div class="cash-value" id="cash-text">$133,080</div>
            <p style="color: #64748b; margin-top: 15px; font-size: 18px;">Median Software Developer Salary</p>
        </div>

        <div class="scene" id="scene6">
            <div class="outro-box">
                <span style="color: #6a737d;">// The Ultimate Power Move</span><br>
                <span style="color: #d73a49;">System</span>.<span style="color: #005cc5;">out</span>.println(<span style="color: #032f62;">"Enroll in APCSA"</span>);
            </div>
            <button class="lock-btn" id="final-btn">LOCK IN NOW</button>
        </div>

    </div>

    <div class="controls">
        <button class="control-btn" onclick="startAnimation()"><i class="fa-solid fa-play"></i> Run Animation</button>
    </div>

<script>
    const timeline = [
        { time: 0, action: runScene1 },
        { time: 2500, action: runScene2 },
        { time: 5500, action: runScene3 },
        { time: 8500, action: runScene4 },
        { time: 12000, action: runScene5 },
        { time: 15000, action: runScene6 }
    ];

    let timers = [];

    function clearAllTimers() {
        timers.forEach(t => clearTimeout(t));
        timers = [];
    }

    function switchScene(sceneId) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(sceneId).classList.add('active');
    }

    function startAnimation() {
        clearAllTimers();
        
        // Reset element states
        document.getElementById('terminal-text').innerHTML = '';
        document.getElementById('vortex-grid').classList.remove('vortex-shrink');
        document.getElementById('ai-text').classList.remove('reveal');
        document.getElementById('aura-counter').innerText = '+0';
        document.getElementById('aura-text').classList.remove('pop');
        document.getElementById('block1').classList.remove('slide-in');
        document.getElementById('block2').classList.remove('slide-in');
        document.getElementById('block3').classList.remove('slide-in');
        document.getElementById('cash-text').classList.remove('boom');
        document.getElementById('final-btn').classList.remove('pulse');

        // Execute step-by-step chain
        timeline.forEach(event => {
            let t = setTimeout(event.action, event.time);
            timers.push(t);
        });
    }

    // SCENE 1 RUNNER
    function runScene1() {
        switchScene('scene1');
        const text = "THE WORLD IS RUNNING ON CODE...";
        let i = 0;
        const elem = document.getElementById('terminal-text');
        
        function type() {
            if (i < text.length) {
                elem.innerHTML += text.charAt(i);
                i++;
                let t = setTimeout(type, 50);
                timers.push(t);
            }
        }
        type();
    }

    // SCENE 2 RUNNER
    function runScene2() {
        switchScene('scene2');
        let t1 = setTimeout(() => {
            document.getElementById('vortex-grid').classList.add('vortex-shrink');
        }, 800);
        let t2 = setTimeout(() => {
            document.getElementById('ai-text').classList.add('reveal');
        }, 1600);
        timers.push(t1, t2);
    }

    // SCENE 3 RUNNER
    function runScene3() {
        switchScene('scene3');
        let counter = 0;
        const target = 1000;
        const elem = document.getElementById('aura-counter');
        
        function countUp() {
            if (counter < target) {
                counter += 40;
                elem.innerText = "+" + counter + " AURA POINTS";
                let t = setTimeout(countUp, 20);
                timers.push(t);
            } else {
                document.getElementById('aura-text').classList.add('pop');
            }
        }
        let tInit = setTimeout(countUp, 300);
        timers.push(tInit);
    }

    // SCENE 4 RUNNER
    function runScene4() {
        switchScene('scene4');
        let t1 = setTimeout(() => document.getElementById('block1').classList.add('slide-in'), 300);
        let t2 = setTimeout(() => document.getElementById('block2').classList.add('slide-in'), 900);
        let t3 = setTimeout(() => document.getElementById('block3').classList.add('slide-in'), 1500);
        timers.push(t1, t2, t3);
    }

    // SCENE 5 RUNNER
    function runScene5() {
        switchScene('scene5');
        let t = setTimeout(() => {
            document.getElementById('cash-text').classList.add('boom');
        }, 400);
        timers.push(t);
    }

    // SCENE 6 RUNNER
    function runScene6() {
        switchScene('scene6');
        let t = setTimeout(() => {
            document.getElementById('final-btn').classList.add('pulse');
        }, 500);
        timers.push(t);
    }

    // Initialize automatically on load
    window.onload = startAnimation;
</script>
</body>
</html>
